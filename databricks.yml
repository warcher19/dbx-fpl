bundle:
  name: dbx-fpl

variables:
  landing_volume_path:
    description: "UC Volume path used as the landing zone for API JSON and historical CSVs"
    default: "/Volumes/fpl/bronze/landing"
  catalog:
    description: "Unity Catalog catalog name"
    default: fpl

targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: will-free-env

  prod:
    mode: production
    workspace:
      profile: will-free-env

resources:
  pipelines:
    fpl_medallion:
      $ref: resources/fpl_pipeline.pipeline.yml

  jobs:
    fpl_api_ingestion:
      $ref: resources/fpl_api_ingestion.job.yml
    fpl_model_retrain:
      $ref: resources/fpl_model_retrain.job.yml
