resources:
  jobs:
    fpl_model_retrain:
      name: fpl_model_retrain
      description: "Weekly LSTM retraining from Gold tables → MLflow → champion model promotion"

      schedule:
        quartz_cron_expression: "0 0 6 ? * MON *"
        timezone_id: UTC
        pause_status: UNPAUSED

      email_notifications:
        on_failure:
          - willdataarcher@gmail.com

      tasks:
        - task_key: lstm_training
          description: "Train LSTM model on fpl.gold.fact_gameweek_performance and log to MLflow"
          notebook_task:
            notebook_path: ../notebooks/lstm_training.ipynb
            source: WORKSPACE
          environment_key: ml

      environments:
        - environment_key: ml
          spec:
            client: "1"
            dependencies:
              - tensorflow>=2.20.0
              - scikit-learn>=1.7.2
              - mlflow>=2.0.0
