resources:
  pipelines:
    fpl_medallion:
      name: fpl_medallion

      catalog: fpl
      target: silver

      serverless: true
      channel: current

      libraries:
        - glob:
            include: ../src/bronze/*.py
        - glob:
            include: ../src/silver/*.py
        - glob:
            include: ../src/gold/*.py

      configuration:
        spark.databricks.delta.schema.autoMerge.enabled: "true"
