resources:
  jobs:
    fpl_api_ingestion:
      name: fpl_api_ingestion
      description: "Fetch latest FPL API data → upload to landing volume → trigger fpl_medallion pipeline update"

      schedule:
        quartz_cron_expression: "0 0 8 ? * TUE,THU,SAT *"
        timezone_id: UTC
        pause_status: UNPAUSED

      email_notifications:
        on_failure:
          - willdataarcher@gmail.com

      tasks:
        - task_key: fetch_api_data
          description: "Call FPL API endpoints and write JSON snapshots to UC Volume landing zone"
          spark_python_task:
            python_file: ../src/ingestion/fetch_fpl_api.py
          job_cluster_key: ingestion_cluster
          libraries:
            - pypi:
                package: aiohttp>=3.8.0
            - pypi:
                package: requests>=2.28.0

        - task_key: trigger_pipeline_update
          description: "Start a triggered update of the fpl_medallion pipeline"
          depends_on:
            - task_key: fetch_api_data
          pipeline_task:
            pipeline_id: ${resources.pipelines.fpl_medallion.id}
            full_refresh: false

      job_clusters:
        - job_cluster_key: ingestion_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 1
            spark_env_vars:
              FPL_API_BASE_URL: "https://fantasy.premierleague.com/api/"
