resources:
  jobs:
    fpl_api_ingestion:
      name: fpl_api_ingestion
      description: "Fetch latest FPL API data → upload to landing volume → trigger fpl_medallion pipeline update"

      schedule:
        quartz_cron_expression: "0 0 8 ? * TUE,THU,SAT *"
        timezone_id: UTC
        pause_status: UNPAUSED

      email_notifications:
        on_failure:
          - willdataarcher@gmail.com

      tasks:
        - task_key: fetch_api_data
          description: "Call FPL API endpoints and write JSON snapshots to UC Volume landing zone"
          notebook_task:
            notebook_path: ../notebooks/fetch_fpl_api.ipynb
            source: WORKSPACE
          environment_key: default

        - task_key: trigger_pipeline_update
          description: "Start a triggered update of the fpl_medallion pipeline"
          depends_on:
            - task_key: fetch_api_data
          pipeline_task:
            pipeline_id: ${resources.pipelines.fpl_medallion.id}
            full_refresh: false

      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - aiohttp>=3.8.0
              - requests>=2.28.0
